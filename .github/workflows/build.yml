# Build Android APK und erstelle GitHub Release
# Wird bei Push auf main ausgeführt (nach Sync von creator-worker).
# APK zum Download: https://github.com/eazpire/eazpire-android/releases

name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # Erforderlich für GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: ""
          JAVA_OPTS: ""
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release AAB (bundle)
        env:
          GRADLE_OPTS: ""
          JAVA_OPTS: ""
        run: ./gradlew bundleRelease --no-daemon
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare APK for release
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk eazpire-creator-debug.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "eazpire Creator – Build #${{ github.run_number }}"
          body: |
            ## Installation
            1. Lade **eazpire-creator-debug.apk** herunter
            2. Öffne die Datei auf deinem Android-Gerät
            3. Erlaube „Installation aus unbekannten Quellen“, falls gefragt
            4. App installieren und öffnen
          draft: false
          files: eazpire-creator-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
